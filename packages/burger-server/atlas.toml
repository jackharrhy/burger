# Tile catalog. Source of truth for what can be painted.
# id is stable forever — never reuse an id, even if you delete a tile.
# type is one of: floor, wall, counter.

[meta]
# Atlas image dimensions in pixels. Must match packages/burger-client/public/assets/atlas.png.
# Update this when you swap in a larger atlas. Width and height should both be multiples of 32.
